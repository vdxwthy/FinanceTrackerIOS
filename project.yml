name: FinanceTracker
options:
  bundleIdPrefix: com.evgenijmihajlov
  deploymentTarget:
    iOS: "17.0"
  
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  FinanceTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinanceTracker/Sources
    resources:
      - path: FinanceTracker/Resources/Assets.xcassets
      - path: FinanceTracker/Resources/en.lproj
      - path: FinanceTracker/Resources/ru.lproj
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evgenijmihajlov.FinanceTracker
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FinanceTracker/Resources/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  FinanceTracker:
    build:
      targets:
        FinanceTracker: all
    run:
      config: Debug
    test:
      config: Debug
